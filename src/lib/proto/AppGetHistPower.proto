syntax = "proto3";
message AppGetHistPowerReqDTO {
    int64 serial_number = 1;
    int32 ap = 2;
    int32 cp = 3;
    int32 offset = 4;
    uint32 request_time = 5;
    uint32 start_time = 6;
    uint32 long_term_start = 7;
    uint32 absolute_start = 8;
    uint32 step_time = 9;
    uint32 relative_power = 10;
    uint32 total_energy = 11;
    uint32 daily_energy = 12;
    repeated int32 power_array = 13;
    uint32 warning_number = 14;
}
message AppGetHistPowerResDTO {
    int32 cp = 1;
    int32 offset = 2;
    uint32 requested_time = 3;
    uint32 requested_day = 4;
}
