name: Bug Report
description: Report a bug with the Hoymiles adapter
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: dropdown
    id: connection_mode
    attributes:
      label: Connection mode
      options:
        - Local (TCP)
        - Cloud (S-Miles)
        - Local + Cloud
    validations:
      required: true

  - type: input
    id: inverter_model
    attributes:
      label: Inverter model
      placeholder: "e.g. HMS-800W-2T"
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Adapter log
      description: Paste the relevant log output (set log level to debug first)
      render: shell

  - type: input
    id: adapter_version
    attributes:
      label: Adapter version
      placeholder: "e.g. 0.0.1"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"

  - type: input
    id: js_controller
    attributes:
      label: js-controller version
      placeholder: "e.g. 7.1.0"

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I am using the latest adapter version
          required: true
        - label: I have checked for existing issues
          required: true
